ReleaseNotes: |-
  Initial release.
  - Safe cache cleanup on Windows + macOS (zero runtime deps; stdlib only)
  - Single binary distribution (PyInstaller) and Python pip/pipx install
  - One-shot CLI + macOS launchd daemon for scheduled maintenance
