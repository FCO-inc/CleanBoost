ShortDescription: Single-binary Python CLI that safely cleans system, browser and game caches on Windows + macOS.
Description: |-
  Cleenboost is a zero-dependency Python CLI that automatically cleans system and
  game caches on Windows and macOS. It detects orphaned temp files, browser caches,
  build caches, Steam/Epic/Origin leftovers, and other safe-to-delete files —
  freeing disk space safely.
  Ships as a single binary on each platform (PyInstaller). Includes a one-shot
  cleaner (`cleanboost`) and a background maintenance daemon (`cleanboost-daemon`)
  for macOS via launchd. No telemetry. MIT licensed. Zero runtime dependencies.
Moniker: cleenboost
